<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SpeccyGo - ZX Spectrum Web Player</title>
    <link rel="stylesheet" href="css/ui.css">
</head>
<body>

    <div id="orientation-warning">
        <p>Please rotate your device to landscape mode to play.</p>
    </div>

    <div id="game-container">
        <div id="speccy-container"></div>
        
        <div id="boot-screen">
            <p id="boot-log">> SpeccyGo BIOS v1.0...</p>
        </div>

        <div id="floating-controller" class="hidden">
            <div class="d-pad">
                <button id="btn-up" class="ctrl-btn" data-key="up">U</button>
                <div class="d-pad-middle">
                    <button id="btn-left" class="ctrl-btn" data-key="left">L</button>
                    <button id="btn-right" class="ctrl-btn" data-key="right">R</button>
                </div>
                <button id="btn-down" class="ctrl-btn" data-key="down">D</button>
            </div>
            <div class="action-buttons">
                <button id="btn-fire" class="ctrl-btn action" data-key="fire">FIRE</button>
            </div>
            <div class="system-buttons">
                <button id="btn-toggle-input">Mode: Joystick</button>
            </div>
        </div>
    </div>

    <script src="js/jsspeccy.js"></script>
    <script src="js/input.js"></script>
    <script src="js/emulator.js"></script>
</body>
</html>
