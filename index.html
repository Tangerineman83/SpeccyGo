<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>SpeccyGo Native</title>
    <link rel="stylesheet" href="css/ui.css">
    <script>
        const NativeAudioContext = window.AudioContext || window.webkitAudioContext;
        let globalSharedAudioCtx = null;
        if (NativeAudioContext) {
            window.AudioContext = window.webkitAudioContext = function() {
                if (!globalSharedAudioCtx) globalSharedAudioCtx = new NativeAudioContext();
                return globalSharedAudioCtx;
            };
        }
    </script>
</head>
<body>
    <div id="rotate-overlay">
        <h2>🔄 Rotate Device</h2>
        <p>Please turn to landscape mode.</p>
    </div>

    <div id="game-container">
        <div id="speccy-container"></div>
        
        <div id="library-menu">
            <h2>INSERT TAPE</h2>
            <div class="rom-list">
                <button class="rom-btn" data-rom="FastFood.tzx">Fast Food</button>
                <button class="rom-btn" data-rom="Dizzy3-FantasyWorldDizzy.tzx">Fantasy World Dizzy</button>
                <hr style="border-color:#0f0; margin: 10px 0;">
                
                <label for="rom-upload" class="rom-btn custom-label">LOAD FROM DEVICE...</label>
                <input type="file" id="rom-upload" accept=".tzx,.tap" style="display: none;">
            </div>
        </div>

        <div id="boot-screen"><p id="boot-log">> SpeccyGo BIOS v2.2.1...</p></div>

        <div id="floating-controller" class="hidden">
            <div id="system-bar">
                <button id="btn-kb-toggle" class="sys-btn">⌨ KEYBOARD</button>
            </div>

            <div id="v-kb-left" class="v-kb hidden"></div>
            <div id="v-kb-right" class="v-kb hidden"></div>

            <div class="d-pad-wrapper">
                <button id="btn-up" class="ctrl-btn dir" data-key="up">▲</button>
                <button id="btn-left" class="ctrl-btn dir" data-key="left">◀</button>
                <div class="d-pad-center"></div>
                <button id="btn-right" class="ctrl-btn dir" data-key="right">▶</button>
                <button id="btn-down" class="ctrl-btn dir" data-key="down">▼</button>
            </div>
            
            <div class="action-wrapper">
                <button id="btn-enter" class="ctrl-btn action select" data-key="enter">ENTER</button>
                <button id="btn-fire" class="ctrl-btn action" data-key="fire">FIRE</button>
            </div>
        </div>
    </div>

    <script src="js/jdataview.js"></script>
    <script src="js/jsspeccy-core.min.js"></script>
    <script src="js/input.js"></script>
    <script src="js/emulator.js"></script>
</body>
</html>
